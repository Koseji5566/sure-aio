[upstream]
# Note: keep this file as the canonical upstream pin source for release/tag automation.
name = "Sure"
type = "github-tag"
repo = "we-promise/sure"
image = "we-promise/sure"
version_source = "dockerfile-arg"
version_key = "UPSTREAM_VERSION"
digest_source = "dockerfile-arg"
digest_key = "UPSTREAM_IMAGE_DIGEST"
strategy = "pr"
stable_only = true

[notifications]
# Keep this file under source control for manual/forced republish triggers when registry parity needs repair.
release_notes_url = "https://github.com/we-promise/sure/releases"
