name: Sync Template to Awesome-Unraid

on:
  push:
    paths:
      - 'sure-aio.xml'
      - '.github/workflows/sync-template.yml'
    branches:
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check sync configuration
        env:
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          if [[ -z "${SYNC_TOKEN}" ]]; then
            echo "SYNC_ENABLED=false" >> "${GITHUB_ENV}"
            echo "SYNC_TOKEN is not configured; skipping sync."
          else
            echo "SYNC_ENABLED=true" >> "${GITHUB_ENV}"
          fi

      - name: Checkout Source Repository
        if: ${{ env.SYNC_ENABLED == 'true' }}
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        
      - name: Checkout Target Repository
        if: ${{ env.SYNC_ENABLED == 'true' }}
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          repository: JSONbored/awesome-unraid
          token: ${{ secrets.SYNC_TOKEN }}
          path: target-repo
          
      - name: Copy and Commit Template
        if: ${{ env.SYNC_ENABLED == 'true' }}
        run: |
          cp sure-aio.xml target-repo/sure-aio.xml
          cd target-repo
          
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add sure-aio.xml
          
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-sync sure-aio.xml from upstream" && git push)
