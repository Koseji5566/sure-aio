name: Sync Template to Awesome-Unraid

on:
  push:
    paths:
      - 'sure-aio.xml'
      - '.github/workflows/sync-template.yml'
    branches:
      - master

# Hyper-secure least privilege: drop all default GITHUB_TOKEN permissions
permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Repository
        uses: actions/checkout@v4
        
      - name: Checkout Target Repository
        uses: actions/checkout@v4
        with:
          repository: JSONbored/awesome-unraid
          token: ${{ secrets.SYNC_TOKEN }}
          path: target-repo
          
      - name: Copy and Commit Template
        run: |
          cp sure-aio.xml target-repo/sure-aio.xml
          cd target-repo
          
          # Use standard bot identity
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add sure-aio.xml
          
          # Only commit and push if there are actual changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-sync sure-aio.xml from upstream" && git push)
